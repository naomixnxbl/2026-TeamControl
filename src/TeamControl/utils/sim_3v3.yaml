# 3v3 BT-vs-BT simulation config - consumed by main_bt_3v3.py.
#
# Network settings (grSim address, vision multicast/port, send_to_grSim,
# robot IPs) still come from ipconfig.yaml. Behavior tree tuning still comes
# from bt_tuning.yaml.

# Robot shell IDs each side controls. Both sides drive their own 0..2 because
# grSim spawns ids per colour.
yellow:
  robot_ids: [0, 1, 2]
blue:
  robot_ids: [0, 1, 2]

# Per-robot role assignment, applied to BOTH teams.
# Valid roles: goalie, defender, supporter, attacker.
roles:
  0: goalie
  1: attacker
  2: supporter

# Dynamic role swapping toggle. False keeps the static roles above.
# 3v3 only has two field robots, so static roles preserve an attacker and a
# supporter by default. If enabled, the shared bt_tuning.yaml role_swap targets
# may prefer attacker + defender instead.
heuristic_role_swap: false

# Runtime movement safety toggles.
# These are final guard rails applied after the behavior trees choose targets.
# FOR THE REAL MATCH, KEEP THESE ALL TRUE
movement_safety:
  # Clamp robot movement/dribble targets inside the playable field.
  keep_robots_in_bounds: true

  # Clamp the goalie movement target inside our goalie box.
  # This applies to whichever side the current team is defending.
  keep_goalie_in_goal_box: true

  # Keep every non-goalie out of our goalie box.
  # If a target or straight-line route would enter the box, the coordinator
  # reroutes that robot toward the nearest outside edge/corner first.
  keep_non_goalies_out_of_goalie_box: true

  # Prevent our robots from touching the ball in the opponent defense area
  # during RUNNING play. They may still enter the area without touching the
  # ball, but kick/pass/dribble/chase-ball intents get held outside the box.
  avoid_ball_touch_in_opponent_defense_area: true

  # Field and goalie-box dimensions in metres. These match the current grSim
  # 9m x 6m setup and the existing goalie logic.
  field_length: 9.0
  field_width: 6.0
  field_margin: 0.05
  goalie_box_depth: 1.0
  goalie_box_width: 2.0
  goalie_box_margin: 0.05

  # Extra distance outside the protected goalie-box boundary used for rewritten
  # non-goalie targets. Increase this if robots still jitter at the boundary;
  # decrease it if they stay too far away from the box.
  goalie_box_avoid_margin: 0.15
  goalie_box_exit_margin: 0.10

  # Treat balls this close to a defense area as touch-risky even when the ball
  # center is technically outside the box. This accounts for robot/ball size
  # and prevents boundary-line contact edge cases.
  defense_area_ball_touch_margin: 0.18

  # If an attacker is dribbling toward the opponent defense area and the ball is
  # this close to the touch-risk boundary, kick instead of parking at the edge.
  # Increase if attackers still freeze near the opponent goalie box; decrease if
  # they shoot too early before carrying the ball into a useful position.
  defense_area_dribble_kick_margin: 0.30

# Tick period in seconds for each BT process (100 Hz = 0.01).
tick_period: 0.01
