# Defaults for TeamControl.bt.tactics.heuristic_role_swap.
#
# All role-score inputs are normalized relative to the current field/team state.
# Increasing a value makes that heuristic matter more for that role.

role_targets:
  attackers: 1
  min_defenders: 1
  max_defenders: 2
  min_supporters: 1

context:
  # Multiplied by field scale before line-of-sight checks.
  goal_sight_clearance_field_scale: 0.02

  # Multiplied by field scale when checking whether a robot is in a lane.
  lane_width_field_scale: 0.04

  # Multiplied by field scale for opponent pressure scoring.
  pressure_radius_field_scale: 0.12

  # Multiplied by field scale to decide whether a robot is holding the ball.
  # If neither team is this close to the ball, the ball is treated as loose.
  possession_radius_field_scale: 0.06

stability:
  # Soft bias toward keeping the current role.
  current_role_bias: 0.08

  # Stronger soft bias while inside the cooldown window.
  cooldown_bias: 0.16

  # Seconds before role switching loses the cooldown bias.
  minimum_swap_interval: 1.0

defender_count:
  # Keep one defender normally; allow a second defender under pressure.
  add_second_when_opponent_has_ball: true
  add_second_when_ball_in_our_half: true
  minimum_candidates_after_attackers: 3

attacker:
  ball_close: 0.40
  approach_quality: 0.20
  angle_score: 0.14
  opponent_goal_close: 0.12
  goal_sight: 0.08
  pressure_escape: 0.04
  own_has_ball: 0.02

  # Extra attacker score for the closest robot when the opponent has the ball.
  # This creates one pressing robot without making every supporter chase.
  opponent_has_ball_pressure: 0.12

  # Extra attacker score for the closest robot when neither team clearly has the ball.
  loose_ball_pressure: 0.10

defender:
  own_goal_close: 0.28
  ball_close: 0.22
  own_lane: 0.24
  ball_danger: 0.16
  pressure_escape: 0.06
  opponent_has_ball: 0.04

supporter:
  spacing: 0.30
  opponent_goal_close: 0.20
  pressure_escape: 0.16
  goal_sight: 0.14
  not_crowding_ball: 0.10
  forward_lane: 0.08
  own_has_ball: 0.02
